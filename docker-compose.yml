version: "3.9"

services:
  app:
    build: .
    container_name: goldencare-app
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      - db
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - goldencare-net

  db:
    image: postgres:15
    container_name: goldencare-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - goldencare-net

volumes:
  postgres_data:

networks:
  goldencare-net:
    driver: bridge